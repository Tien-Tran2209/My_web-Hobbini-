name: Symfony CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  symfony-tests:
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      APP_DEBUG: 0
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/hobbini_test?serverVersion=8.0&charset=utf8mb4"

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: hobbini_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, intl, pdo_mysql
          coverage: none

      # Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      # Composer
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Clear cache safely
        run: php bin/console cache:clear --env=test --no-warmup || true

      # Wait for MySQL
      - name: Wait for MySQL
        run: |
          for i in {1..40}; do
            mysqladmin ping -h 127.0.0.1 -uroot -proot --silent && echo "MySQL ready" && exit 0
            echo "Waiting MySQL..."
            sleep 2
          done
          echo "MySQL not ready"
          exit 1

      # Debug
      - name: Show APP_ENV
        run: php -r "echo 'APP_ENV='.getenv('APP_ENV').PHP_EOL;"

      - name: Show DATABASE_URL
        run: php -r "echo 'DATABASE_URL='.getenv('DATABASE_URL').PHP_EOL;"

      - name: Symfony About
        run: php bin/console about --env=test

      # Database
      - name: Create database schema
        run: php bin/console doctrine:schema:create --env=test -n

      - name: Validate Doctrine schema
        run: php bin/console doctrine:schema:validate --env=test

      # Tests
      - name: Run PHPUnit
        run: php bin/phpunit --configuration phpunit.xml.dist