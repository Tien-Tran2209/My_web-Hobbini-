            description: API documentation for Hobbini project
            version: 1.0.0

        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT

        security:
            - Bearer: []

    areas:
        default:
            path_patterns:
                - ^/api