version: '3.9'

services:
  app:
    build: .
    container_name: hobbini_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mysql
      - redis
      - mongo
    environment:
      APP_ENV: ${APP_ENV:-dev}
      DATABASE_URL: mysql://root:root@mysql:3306/hobbini
      REDIS_URL: redis://redis:6379
      MONGODB_URL: mongodb://mongo:27017

  mysql:
    image: mysql:8.0
    container_name: hobbini_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hobbini
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mysql_test:
    image: mysql:8.0
    container_name: hobbini_mysql_test
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hobbini_test
    ports:
      - "3308:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: hobbini_redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    container_name: hobbini_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  mysql_test_data:
  mongo_data: