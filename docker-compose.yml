version: '3.9'

services:
  app:
    build: .
    container_name: hobbini_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - mysql
      - redis
      - mongo

  mysql:
    image: mysql:8.0
    container_name: hobbini_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hobbini
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: hobbini_redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo:7
    container_name: hobbini_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  mongo_data: